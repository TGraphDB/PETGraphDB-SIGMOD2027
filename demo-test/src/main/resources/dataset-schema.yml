dataset: energy
node:
  name: [ u_sid, name, country, voltage, latitude, longitude]
  type: [ str, str, str, int, float, float]
node_tp:
  name:
  - load_signal
  - solar_cosmo_p
  - solar_cosmo_u
  - solar_ecmwf_p
  - solar_ecmwf_u
  - wind_cosmo_p
  - wind_cosmo_u
  - wind_ecmwf_p
  - wind_ecmwf_u
  type: [ float, float, float, float, float, float, float, float, float ]
rel:
  name: [ u_sid, x, y, r_limit, r_length ]
  type: [ str, float, float, int, float ]
---
dataset: traffic
node:
  name: [ u_sid, name ]
  type: [ str, str ]
rel:
  name: [ u_sid, angle, r_type, r_length ]
  type: [ str, int, int, int ]
rel_tp:
  name: [ travel_time, full_status, segment_cnt ]
  type: [ int, int, int ]
